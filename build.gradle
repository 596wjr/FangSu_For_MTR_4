plugins {
    id 'dev.architectury.loom' version '1.11-SNAPSHOT' apply false
    id 'architectury-plugin' version '3.4-SNAPSHOT'
    id 'com.gradleup.shadow' version '8.3.6' apply false
//    id "com.github.johnrengelman.shadow" version "8.1.1"
    id "de.undercouch.download" version "4.1.2"
}

// ===== 版本依赖管理（必须在 architectury 块之前加载） =====
// 支持 -Pgame_version=1.19.2 切换 MC 版本，默认 1.20.1
// 设置 minecraft_version / minecraft_version_int 等属性到 allprojects
apply from: "build_dep_ver.gradle"

architectury {
    minecraft = project.minecraft_version
}

allprojects {
    group = rootProject.maven_group
    version = rootProject.mod_version

    configurations.all {
        resolutionStrategy {
            // 强制所有 lwjgl 核心模块和平台相关模块使用 3.3.1
            force 'org.lwjgl:lwjgl:3.3.1'
            force 'org.lwjgl:lwjgl-glfw:3.3.1'
            force 'org.lwjgl:lwjgl-jemalloc:3.3.1'
            force 'org.lwjgl:lwjgl-openal:3.3.1'
            force 'org.lwjgl:lwjgl-opengl:3.3.1'
            force 'org.lwjgl:lwjgl-stb:3.3.1'
            force 'org.lwjgl:lwjgl-tinyfd:3.3.1'
            // 如果有需要，也可以强制 vulkan（但 1.20.1 通常不需要）
            // force 'org.lwjgl:lwjgl-vulkan:3.3.1'
        }
    }

    gradle.projectsEvaluated {
        tasks.withType(JavaCompile) {
            options.compilerArgs << "-Xmaxerrs" << "400"
        }
    }
}

/*
 * 平台检测（task name 检测方式）
 * 结果放到 ext.platform：UNKNOWN / FABRIC / FORGE / NEOFORGE (预留)
 */
ext {
    platform = "UNKNOWN"

    def taskNames = gradle.startParameter.taskNames.join(" ").toLowerCase()

    if (taskNames.contains("fabric")) {
        platform = "FABRIC"
    } else if (taskNames.contains("forge")) {
        platform = "FORGE"
    } else if (taskNames.contains("neoforge")) {
        platform = "NEOFORGE"
    }

    graaljsVersion = "24.2.2"
}
apply from: "build_process.gradle"
//boolean buildForAnte = project.hasProperty("build_for_ante") && project.property("build_for_ante") == "true"

println "[Build] Current platform = ${platform}"
//println "[Build] Build for ANTE : ${buildForAnte}"

subprojects {
    apply plugin: 'dev.architectury.loom'
    apply plugin: 'architectury-plugin'
    apply plugin: 'maven-publish'

    base {
        archivesName = "$rootProject.archives_name"
//        +(buildForAnte ? "-ANTE" : "")
    }

    repositories {
        // ======= Central =======
        mavenCentral()
        // 本地构建可用阿里云镜像加速（若可用）
        maven { url = "https://maven.aliyun.com/repository/central" }

        // ======= MC 专用 =======
        maven {
            name = "BMCLAPI"
            url = "https://bmclapi2.bangbang93.com/maven"
            allowInsecureProtocol = true
            content {
                includeGroup "net.minecraft"
                includeGroup "net.fabricmc"
                includeGroup "net.minecraftforge"
                includeGroup "dev.architectury"
                includeGroup "org.parchmentmc"
                includeGroup "me.shedaniel"
                includeGroup "com.terraformersmc"
                includeGroup "maven.modrinth"
            }
        }

        maven {
            url = "https://maven.fabricmc.net/"
            content { includeGroup "net.fabricmc" }
        }

        maven {
            url = "https://maven.architectury.dev/"
            content { includeGroup "dev.architectury" }
        }

        maven {
            url = "https://maven.minecraftforge.net/"
            content { includeGroup "net.minecraftforge" }
        }

        maven {
            url = "https://maven.parchmentmc.org"
            content { includeGroup "org.parchmentmc" }
        }

        maven {
            url = "https://api.modrinth.com/maven"
            content { includeGroup "maven.modrinth" }
        }
    }

    loom {
        silentMojangMappingsLicense()
    }

//    def nteVariant = buildForAnte == true
//            ? "ante"
//            : "nte"
//
//    def nteDep = nteVariant == "ante"
//            ? "maven.modrinth:mtr-ante:${rootProject.ante_version}"
//            : "maven.modrinth:mtr-nte:${rootProject.nte_version}"

    dependencies {
        minecraft "net.minecraft:minecraft:$rootProject.minecraft_version"
        mappings loom.officialMojangMappings()

//        if (rootProject.require_nte == true) {
//            if (rootProject.build_for_ante == true) {
//                modImplementation "maven.modrinth:mtr-ante:$rootProject.ante_version"
////                compileOnly "maven.modrinth:mtr-ante:$rootProject.ante_version"
//            } else {
//                modImplementation "maven.modrinth:mtr-nte:$rootProject.nte_version"
//
//            }
//
//        }
//        modImplementation "maven.modrinth:mtr-nte:$rootProject.nte_version"

        compileOnly "maven.modrinth:minecraft-transit-railway:${rootProject.mtr_version_forge}"
        compileOnly "maven.modrinth:jcm:${rootProject.jcm_version_forge}"

        compileOnly("org.graalvm.sdk:graal-sdk:${rootProject.graaljsVersion}")
        compileOnly("org.graalvm.truffle:truffle-api:${rootProject.graaljsVersion}")
        compileOnly("org.graalvm.js:js-language:${rootProject.graaljsVersion}")
        compileOnly("org.graalvm.js:js-scriptengine:${rootProject.graaljsVersion}")
    }

    java {
        withSourcesJar()
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    tasks.withType(JavaCompile).configureEach {
        it.options.release = 17
    }

    tasks.matching { it.name == "sourcesJar" }.configureEach {
        dependsOn(tasks.named("processConditionalSources"))
    }

    // ---- 条件编译预处理：每个子工程单独注册 task（避免 root 没有 src/main/java 导致问题） ----

    // 生成目录（相对于子工程的 build）
    def generatedSrcDir = layout.buildDirectory.dir("generated/sources/conditional")

    // 注册处理任务（名称为 processConditionalSources，子工程内唯一）
    tasks.register("processConditionalSources") {
        // 子工程的源码输入目录
        def inputDir = file("src/main/java")

        // 仅在该子工程确实有源代码时参与输入校验与执行，避免 Gradle 配置期失败
        onlyIf {
            inputDir.exists()
        }

        // 仅当目录存在时把它声明为 inputs（避免 Gradle 校验错误）
        if (inputDir.exists()) {
            inputs.dir(inputDir)
        }
        // 版本号变化时也必须重新生成
        inputs.property("minecraft_version_int", rootProject.ext.has("minecraft_version_int")
                ? rootProject.ext.minecraft_version_int : "12001")
        outputs.dir(generatedSrcDir)

        doLast {
            // 如果没有输入目录，直接不做事（防御）
            if (!inputDir.exists()) {
                logger.lifecycle("processConditionalSources: no src/main/java in ${project.path}, skipping")
                return
            }

            def outDir = generatedSrcDir.get().asFile
            outDir.deleteDir()
            outDir.mkdirs()

            // 只处理 Java 文件；保留相对路径
            fileTree(inputDir).matching {
                include "**/*.java"
            }.each { File input ->
                def relativePath = input.absolutePath.substring(inputDir.absolutePath.length() + 1)
                def output = new File(outDir, relativePath)
                output.parentFile.mkdirs()

                // 调用你在 build_process.gradle 中定义并暴露到 ext 的处理函数
                // 这里使用 rootProject 的函数（你在 build_process.gradle 应该把 processAccessWidener 放到 ext）
                rootProject.processAccessWidener(input, output)
            }
        }
    }

    tasks.named("processConditionalSources").configure { task ->
        doLast {
            def genDir = layout.buildDirectory.dir("generated/sources/conditional").get().asFile

            // 只在生成目录存在且有内容时才替换
            if (genDir.exists() && genDir.listFiles()?.length > 0) {
                sourceSets.main.java.setSrcDirs([genDir])
                logger.lifecycle("Using conditional sources for ${project.path}")
            }
        }
    }


    // 确保 JavaCompile 在编译前先执行生成任务
    tasks.withType(JavaCompile).configureEach {
        dependsOn tasks.named("processConditionalSources")
    }

    // ---- 发布配置保持原样 ----
    publishing {
        publications {
            mavenJava(MavenPublication) {
                artifactId = base.archivesName.get()
                from components.java
            }
        }
        repositories {
            // publishing repository 配置（如需）
        }
    }

    configurations {
        shadowBundle
    }

    dependencies {
        shadowBundle("org.graalvm.sdk:graal-sdk:${rootProject.graaljsVersion}")
        shadowBundle("org.graalvm.js:js:${rootProject.graaljsVersion}")
    }
}