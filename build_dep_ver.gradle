String default_minecraft_version = "1.20.1"
Properties localProperties = new Properties()
String minecraft_version
if (project.rootProject.file('build.properties').exists()) {
    localProperties.load(project.rootProject.file('build.properties').newDataInputStream())
}
if (rootProject.properties.containsKey("game_version")) {
    def ver = rootProject.properties.get("game_version")?.trim()
    minecraft_version = ver ?: default_minecraft_version
} else if (localProperties.containsKey("MC_VERSION")) {
    String notDotted = localProperties.get("MC_VERSION")
    String dotted = notDotted.substring(0, 1) + "." +
            Integer.toString(Integer.parseInt(notDotted.substring(1, 3))) + "." +
            Integer.toString(Integer.parseInt(notDotted.substring(3, 5)))
    minecraft_version = dotted
} else {
    minecraft_version = default_minecraft_version
}
println "[BuildDepVer] Resolved minecraft_version = ${minecraft_version}"

// ========== 计算所有派生值 ==========

// 版本整数（1.20.1 → 12001, 1.19.2 → 11902）
def mcVersionInt = minecraft_version.split("\\.")[0] +
        minecraft_version.split("\\.")[1].padLeft(2, '0') +
        (minecraft_version.split("\\.").length > 2 ? minecraft_version.split("\\.")[2].padLeft(2, '0') : "00")
def mcMainVer = minecraft_version.split("\\.")[1] as int
def is1193 = minecraft_version == "1.19.3" || minecraft_version == "1.19.4"
def is120 = minecraft_version == "1.20" || minecraft_version == "1.20.1"

// Pack format（数据包格式版本）
def packFormats = [
//        "1.18.2": 7, "1.19.2": 9, "1.19.3": 12, "1.19.4": 13,
        "1.20.1": 15
]
def packFormat = packFormats[minecraft_version] ?: 15

// Forge 版本 & Loader 大版本
def forgeVersions = [
//        "1.18.2": "40.2.0", "1.19.2": "43.3.0", "1.19.3": "44.1.0",
//        "1.19.4": "45.2.0",
        "1.20.1": "47.2.0"
]
def forgeVer = minecraft_version + "-" + (forgeVersions[minecraft_version] ?: "47.2.0")
def forgeMajorVer = (forgeVersions[minecraft_version] ?: "47").split("[.-]")[0] as int

// Fabric Loader & API 版本
def fabricLoaderVer = "0.16.14"
def fabricApiVersions = [
//        "1.18.2": "0.77.0+1.18.2",
//        "1.19.2": "0.77.0+1.19.2", "1.19.3": "0.76.1+1.19.3", "1.19.4": "0.87.2+1.19.4",
        "1.20.1": "0.92.3+1.20.1"
]
def fabricApiVer = fabricApiVersions[minecraft_version] ?: fabricLoaderVer

// Architectury API 版本
def archVersions = [
//        "1.18.2": "4.11.93",
//        "1.19.2": "6.5.85", "1.19.3": "7.1.86", "1.19.4": "8.2.89",
        "1.20.1": "9.1.12"
]
def archApiVer = archVersions[minecraft_version] ?: archVersions.values().first()

// MTR 版本
def mtrFabricVersions = [
//        "1.18.2": "FABRIC-1.18.2-3.2.2-hotfix-1",
//        "1.19.2": "FABRIC-1.19.2-3.2.2-hotfix-1",
//        "1.19.3": "FABRIC-1.19.3-3.2.2-hotfix-1",
//        "1.19.4": "FABRIC-1.19.4-3.2.2-hotfix-1",
        "1.20.1": "FABRIC-4.0.5+1.20.1"
]
def mtrForgeVersions = [
//        "1.18.2": "FORGE-1.18.2-3.2.2-hotfix-1",
//        "1.19.2": "FORGE-1.19.2-3.2.2-hotfix-1",
//        "1.19.3": "FORGE-1.19.3-3.2.2-hotfix-1",
//        "1.19.4": "FORGE-1.19.4-3.2.2-hotfix-1",
        "1.20.1": "FORGE-4.0.5+1.20.1"
]
def mtrFabric = mtrFabricVersions[minecraft_version] ?: mtrFabricVersions["1.20.1"]
def mtrForge = mtrForgeVersions[minecraft_version] ?: mtrForgeVersions["1.20.1"]


def jcm_version_forge="KaGitmYA"
def jcm_version_fabric="v2.2.2+1.20.1"
// 支持的 MC 版本描述
def supportsVer = [
//        "1.18.2": "1.18.x",
//        "1.19.2": "1.19.2", "1.19.3": "1.19.3", "1.19.4": "1.19.4",
        "1.20.1": "1.20.x"
][minecraft_version] ?: "1.20.x"
def supportsVerRange = [
//        "1.18.2": "[1.18, 1.19)",
//        "1.19.2": "1.19.2", "1.19.3": "1.19.3", "1.19.4": "1.19.4",
        "1.20.1": "[1.20, 1.21)"
][minecraft_version] ?: "[1.20, 1.21)"
def parchmentVer = [
//        "1.18.2": "2022.11.06",
//        "1.19.2": "2022.11.27", "1.19.3": "2023.06.25", "1.19.4": "2023.06.26",
        "1.20.1": "2023.09.03"
][minecraft_version] ?: "2023.09.03"

// ========== 传播到所有项目 ==========
allprojects {
    ext.minecraft_version = minecraft_version
    ext.minecraft_main_version = mcMainVer
    ext.minecraft_version_int = mcVersionInt
    ext.is_1_19_3 = is1193
    ext.is_1_20 = is120
    ext.pack_format = packFormat
    ext.forge_loader_version = "[${forgeMajorVer},)"
    ext.fabric_loader_version = fabricLoaderVer
    ext.fabric_api_version = fabricApiVer
    ext.architectury_api_version = archApiVer
    ext.mtr_version_fabric = mtrFabric
    ext.mtr_version_forge = mtrForge
    ext.jcm_version_forge = jcm_version_forge
    ext.jcm_version_fabric = jcm_version_fabric
    ext.minecraft_supports_version = supportsVer
    ext.minecraft_supports_range = supportsVerRange
}

// 版本相关映射表（rootProject 级别，供需要精确版本号的场景使用）
rootProject.ext.forge_version = forgeVer
rootProject.ext.architectury_id = "dev.architectury"
rootProject.ext.parchment_version = parchmentVer

// MTR 最小兼容版本标记
def mtrMinVersions = [
        "1.18.2": "1.18.2-0",
        "1.19.2": "1.19.2-0",
        "1.19.3": "1.19.3-0",
        "1.19.4": "1.19.4-0",
        "1.20.1": "0"
]
rootProject.ext.mtr_min_version = mtrMinVersions[minecraft_version] ?: "0"
rootProject.ext.mtr_min_version = mtrMinVersions[minecraft_version]
