name: Build (Preview)

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                game_version: [
                  #          "1.18.2", "1.19.2", "1.19.3", "1.19.4",
                  "1.20.1" ]
                platform: ["fabric", "forge"]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Build ${{ matrix.platform }} (${{ matrix.game_version }})
              run: ./gradlew :${{ matrix.platform }}:build -Pgame_version=${{ matrix.game_version }} --no-daemon

            # ===== Artifacts =====
            - name: Upload jars (${{ matrix.game_version }} ${{ matrix.platform }})
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.platform }}-${{ matrix.game_version }}
                  path: |
                      ${{ matrix.platform }}/build/libs/*.jar
                      !${{ matrix.platform }}/build/libs/*-dev-shadow.jar
                      !${{ matrix.platform }}/build/libs/*-sources.jar

            - name: Upload sources jars (${{ matrix.game_version }} ${{ matrix.platform }})
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.platform }}-${{ matrix.game_version }}-sources
                  path: |
                      !${{ matrix.platform }}/build/libs/*.jar
                      !${{ matrix.platform }}/build/libs/*-dev-shadow.jar
                      ${{ matrix.platform }}/build/libs/*-sources.jar
