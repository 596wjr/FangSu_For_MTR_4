name: Build (Release)

on:
  workflow_dispatch:

jobs:
  # ==================================================
  # 阶段一：构建
  # ==================================================
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        game_version: [
#          "1.18.2", "1.19.2", "1.19.3", "1.19.4",
                        "1.20.1" ]
        platform: [ "fabric", "forge" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ${{ matrix.platform }} for ${{ matrix.game_version }}
        run: ./gradlew :${{ matrix.platform }}:build -Pgame_version=${{ matrix.game_version }} --no-daemon

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.game_version }}
          path: |
            ${{ matrix.platform }}/build/libs/*.jar
            !${{ matrix.platform }}/build/libs/*-dev-shadow.jar
            !${{ matrix.platform }}/build/libs/*-sources.jar

  # ==================================================
  # 阶段二：所有构建成功后统一上传到 Modrinth
  # ==================================================
  upload-to-modrinth:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read mod_version from gradle.properties
        id: read_version
        run: |
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          echo "MOD_VERSION=$MOD_VERSION" >> $GITHUB_ENV
          echo "Read mod_version: $MOD_VERSION"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded artifacts
        run: ls -R ./artifacts

      - name: Upload each version to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          BASE_VERSION: ${{ env.MOD_VERSION }}
        run: |
          # 遍历所有 artifact 目录（按游戏版本排序）
          for dir in $(find ./artifacts -mindepth 1 -maxdepth 1 -type d | sort -V -t'-' -k2); do
            echo "Processing: $dir"

            dir_name=$(basename "$dir")
            platform=$(echo "$dir_name" | cut -d'-' -f1)
            game_version=$(echo "$dir_name" | cut -d'-' -f2-)

            jar_file=$(find "$dir" -name "*.jar" ! -name "*-sources.jar" ! -name "*-dev-shadow.jar" | head -n 1)

            if [ -z "$jar_file" ]; then
              echo "❌ No valid jar found in $dir, skipping..."
              continue
            fi

            echo "✅ Found jar: $jar_file"

            # 构造元数据
            VERSION_NUMBER="MTR3+${BASE_VERSION}+${platform}.${game_version}"
            VERSION_NAME="MTR4-${BASE_VERSION}-$(echo $platform | tr 'a-z' 'A-Z')"
            LOADERS="[\"$platform\"]"
            GAME_VERSIONS="[\"$game_version\"]"

            DEPENDENCIES='[
              {"project_id":"XKPAmI6u", "dependency_type":"required"},
              {"project_id":"lhGA9TYQ", "dependency_type":"required"}
            ]'

            # 调用 Modrinth API 上传
            # 现在包含所有必需字段：featured, environment (client_and_server)
            curl -X POST "https://api.modrinth.com/v2/version" \
              -H "Authorization: $MODRINTH_TOKEN" \
              -F "data={
                \"project_id\": \"itupwyaA\",
                \"version_number\": \"$VERSION_NUMBER\",
                \"name\": \"$VERSION_NAME\",
                \"version_type\": \"beta\",
                \"loaders\": $LOADERS,
                \"game_versions\": $GAME_VERSIONS,
                \"environment\": \"client_and_server\",
                \"dependencies\": $DEPENDENCIES,
                \"changelog\": \"\",
                \"file_parts\": [\"file\"],
                \"featured\": false
              };type=application/json" \
              -F "file=@$jar_file"

            echo "✅ Uploaded $VERSION_NAME for $game_version"
          done